<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>SVG Polygons</title>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<h1>SVG Regular Polygon Generator</h1>
		<form>
			<div>
				<label for="sides">Number of sides:</label>
				<input id="sides" type="number" min="3" max="1000" required value="3">
			</div>
			<div>
				<label for="radius">Radius (pixels):</label>
				<input id="radius" type="number" min="1" max="1000" required value="60">
			</div>
			<input id="button" type="submit" value="Submit">
		</form>
		<script src="script.js"></script>
	</body>
</html>
