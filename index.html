<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>SVG Polygons</title>
		<link rel="stylesheet" href="/styles.css">
	</head>
	<body>
		<h1>SVG Regular Polygon Generator</h1>
		<form>
			<div>
				<label for="sides">Number of sides:</label>
				<input type="number" required min="3" max="1000" value="3" name="sides" id="sides">
			</div>
			<div>
				<label for="radius">Radius (pixels):</label>
				<input type="number" required min="1" max="1000" value="60" name="radius" id="radius">
			</div>
			<div>
				<label for="decimal-places">Decimal places in path coordinates:</label>
				<input type="number" required min="0" max="100" value="3" name="decimal-places" id="decimal-places">
			</div>
			<input type="submit" value="Submit" id="button">
		</form>
		<script src="script.js"></script>
	</body>
</html>
